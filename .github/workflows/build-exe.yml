name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onedir --console --name CPK_Analyzer --add-data "app.py;." --copy-metadata streamlit --copy-metadata importlib-metadata --collect-all streamlit launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPK_Analyzer_Windows
          path: dist/CPK_Analyzer/
